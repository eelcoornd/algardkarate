{{ define "main" }}
<div style="padding:16px;">
  <h1 style="font-size:20px;margin-bottom:16px;">Arrangementer</h1>
  {{ range .Site.Data.spond_events }}
    {{ if not .cancelled }}
    <div class="arrangement" style="background:white;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:8px;">{{ .title }}</h2>
      <p style="font-size:13px;color:#666;">📅 {{ .start | time.Format "02.01.2006 15:04" }}</p>
      <p style="font-size:13px;color:#666;">📍 {{ .location }}</p>
      <p style="font-size:13px;margin-top:8px;">{{ .description }}</p>
    </div>
    {{ end }}
  {{ end }}
</div>
{{ end }}
