{{ define "main" }}
<div style="background:#1b5e20;color:white;padding:16px;display:flex;align-items:center;gap:14px;">
  <div style="background:rgba(255,255,255,0.2);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-book-open fa-lg"></i></div>
  <div><h2 style="font-size:20px;font-weight:700;">Syllabus</h2><p style="opacity:0.85;font-size:13px;">Kyokushinkai pensum</p></div>
</div>
<div style="padding:16px;">
  <div class="belt-list">
    {{ range sort .Pages "Params.weight" "asc" }}
    <a href="{{ .Permalink }}" class="belt-card">
      <div class="belt-stripe" style="background:{{ .Params.belt_color }}"></div>
      <div class="belt-info"><span class="belt-level">{{ .Params.belt_level }}</span><span class="belt-title">{{ .Title }}</span></div>
      <i class="fas fa-chevron-right" style="color:#ccc"></i>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
