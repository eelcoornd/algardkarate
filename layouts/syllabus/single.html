<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} – {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="top-header">
    <a href="/syllabus/" style="color:white;text-decoration:none"><i class="fas fa-arrow-left"></i></a>
    <span class="site-title">{{ .Params.belt_level }}</span>
    <div style="width:20px"></div>
  </header>

  <div style="background:{{ .Params.belt_color }};padding:24px 16px;color:white;">
    <h2 style="font-size:22px;font-weight:700;">{{ .Title }}</h2>
    <p style="opacity:0.85;font-size:13px;margin-top:4px;">Kyokushinkai Karate – Algård</p>
  </div>

  <div style="padding:20px 16px;">
    <div class="syllabus-content">
      {{ .Content }}
    </div>
  </div>

  <div style="height:80px"></div>
  <nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Hjem</span></a>
    <a href="/posts/" class="nav-item"><i class="fas fa-newspaper"></i><span>Nyheter</span></a>
    <a href="#" class="nav-item"><i class="fas fa-calendar"></i><span>Treninger</span></a>
    <a href="/syllabus/" class="nav-item active"><i class="fas fa-book-open"></i><span>Syllabus</span></a>
    <a href="#" class="nav-item"><i class="fas fa-th"></i><span>Mer</span></a>
  </nav>
</body>
</html>
