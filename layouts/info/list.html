<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info – {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="page-header top-header" style="padding:0;background:#2d2d2d;overflow:hidden;">
    <a href="/"><img src="/images/top-logo.png" alt="Ålgård Karate" style="width:100%;height:70px;object-fit:contain;object-position:left center;display:block;"></a>
  </header>

  <main class="menu-list">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="menu-item">
      {{ with .Params.icon }}<span class="menu-icon" style="background:{{ $.Params.icon_bg | default "#eee" }}"><i class="{{ . }}"></i></span>{{ end }}
      <span class="menu-label">{{ .Title }}</span>
      <i class="fas fa-chevron-right menu-arrow"></i>
    </a>
    {{ end }}
  </main>

  <nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Hjem</span></a>
    <a href="/info/" class="nav-item active"><i class="fas fa-newspaper"></i><span>Info</span></a>
    <a href="/treninger/" class="nav-item"><i class="fas fa-calendar"></i><span>Treninger</span></a>
    <a href="/syllabus/" class="nav-item"><i class="fas fa-book-open"></i><span>Syllabus</span></a>
    <a href="https://www.algardkarate.net/algardkarate/shop/" class="nav-item" target="_blank"><i class="fas fa-shopping-bag"></i><span>Shop</span></a>
  </nav>
</body>
</html>
