{{ define "main" }}
<div style="background:{{ .Params.icon_color | default `#2e7d32` }};padding:24px 16px;color:white;display:flex;align-items:center;gap:14px;">
  <a href="/info/" style="color:white;text-decoration:none;margin-right:8px;" aria-label="Tilbake til info"><i class="fas fa-arrow-left fa-lg"></i></a>
  <div style="background:rgba(255,255,255,0.2);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;"><i class="fas {{ .Params.icon | default `fa-file` }} fa-xl"></i></div>
  <div><h2 style="font-size:20px;font-weight:700;">{{ .Title }}</h2><p style="opacity:0.85;font-size:13px;">Ålgård Karateklubb</p></div>
</div>
<div style="padding:20px 16px;"><div class="syllabus-content">{{ .Content }}</div></div>
{{ end }}
