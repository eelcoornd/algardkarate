<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="page-header top-header" style="padding:0;background:#2d2d2d;overflow:hidden;">
    <a href="/"><img src="/images/top-logo.png" alt="Ålgård Karate" style="width:100%;height:70px;object-fit:contain;object-position:left center;display:block;"></a>
  </header>
  <div style="background:#1a73e8;padding:24px 16px;color:white;display:flex;align-items:center;gap:14px;">
    <a href="/info/" style="color:white;text-decoration:none;margin-right:8px;"><i class="fas fa-arrow-left fa-lg"></i></a>
    <div style="background:rgba(255,255,255,0.2);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-images fa-xl"></i></div>
    <div><h2 style="font-size:20px;font-weight:700;">Bilder</h2><p style="opacity:0.85;font-size:13px;">Algård Karateklubb</p></div>
  </div>

  <div style="padding:20px 16px;">
    {{ .Content }}
  </div>

  {{ partial "bottom-nav.html" . }}
</body>
</html>
