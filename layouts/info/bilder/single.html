{{ define "title" }}{{ .Title }} – Ålgård Karate{{ end }}

{{ define "main" }}
<div style="background:#00838f;padding:24px 16px;color:white;display:flex;align-items:center;gap:14px;">
  <a href="/info/bilder/" style="color:white;text-decoration:none;margin-right:8px;" aria-label="Tilbake til alle album"><i class="fas fa-arrow-left fa-lg"></i></a>
  <div style="background:rgba(255,255,255,0.2);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-images fa-xl"></i></div>
  <div>
    <h2 style="font-size:20px;font-weight:700;">{{ .Title }}</h2>
    <p style="opacity:0.85;font-size:13px;">{{ .Params.photo_count }} bilder</p>
  </div>
</div>

<div style="padding:12px 16px 4px;">
  <a class="album-external-link" href="{{ .Params.album_url }}" target="_blank" rel="noopener">
    <i class="fab fa-google"></i> Åpne hele albumet i Google Photos&nbsp;↗
  </a>
</div>

<div class="photo-grid" id="photo-grid">
  {{ range $i, $p := .Params.photos }}
    <button type="button"
            class="photo-cell"
            data-full="{{ $p }}=w1600-no"
            data-index="{{ $i }}"
            aria-label="Bilde {{ add $i 1 }}"
            style="background-image:url('{{ $p }}=w400-h400-no-c');"></button>
  {{ end }}
</div>

<div id="lightbox" class="lightbox" hidden aria-modal="true" role="dialog">
  <button class="lb-close" type="button" aria-label="Lukk">&times;</button>
  <button class="lb-prev" type="button" aria-label="Forrige">&#10094;</button>
  <button class="lb-next" type="button" aria-label="Neste">&#10095;</button>
  <img class="lb-img" alt="">
  <div class="lb-counter"></div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
(function () {
  var grid = document.getElementById('photo-grid');
  var lb = document.getElementById('lightbox');
  if (!grid || !lb) return;
  var img = lb.querySelector('.lb-img');
  var counter = lb.querySelector('.lb-counter');
  var cells = Array.prototype.slice.call(grid.querySelectorAll('.photo-cell'));
  var idx = 0;

  function show(i) {
    if (i < 0) i = cells.length - 1;
    if (i >= cells.length) i = 0;
    idx = i;
    img.src = cells[i].dataset.full;
    counter.textContent = (i + 1) + ' / ' + cells.length;
  }
  function open(i) {
    show(i);
    lb.hidden = false;
    document.body.style.overflow = 'hidden';
  }
  function close() {
    lb.hidden = true;
    img.removeAttribute('src');
    document.body.style.overflow = '';
  }

  cells.forEach(function (cell, i) {
    cell.addEventListener('click', function () { open(i); });
  });
  lb.querySelector('.lb-close').addEventListener('click', close);
  lb.querySelector('.lb-prev').addEventListener('click', function (e) {
    e.stopPropagation(); show(idx - 1);
  });
  lb.querySelector('.lb-next').addEventListener('click', function (e) {
    e.stopPropagation(); show(idx + 1);
  });
  lb.addEventListener('click', function (e) {
    if (e.target === lb) close();
  });
  document.addEventListener('keydown', function (e) {
    if (lb.hidden) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowLeft') show(idx - 1);
    else if (e.key === 'ArrowRight') show(idx + 1);
  });
})();
</script>
{{ end }}
