<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyheter – {{ .Site.Title }}</title>
  /css/style.css">
  //cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="top-header" style="padding:0;background:#2d2d2d;overflow:hidden;">
    <a href="/"><img src="/images/top-logo.png" alt="Ålgård Karate" style="width:100%;height:70px;object-fit:contain;object-position:left center;display:block;"></a>
  </header>
  <div style="padding:16px;">
    <h2 style="margin:0 0 4px;">Nyheter</h2>
    <p style="font-size:0.85rem;color:#555;margin:0 0 16px;">Siste nytt fra Ålgård Karateklubb</p>
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous"
      src="https://connect.facebook.net/nb_NO/sdk.js#xfbml=1&version=v18.0">
    </script>
    <div class="fb-page"
      data-href="https://www.facebook.com/algardkarate/"
      data-tabs="timeline"
      data-width="500"
      data-height="800"
      data-small-header="true"
      data-adapt-container-width="true"
      data-hide-cover="false"
      data-show-facepile="false">
    </div>
    <p style="margin-top:16px;font-size:0.85rem;">
      <a href="https://www.facebook.com/algardkarate/" target="_blank" style="color:#1565c0;">
        <i class="fab fa-facebook"></i> Åpne Facebook-siden
      </a>
    </p>
  </div>
  <div style="height:80px"></div>
  <nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Hjem</span></a>
    <a href="/nyheter/" class="nav-item active"><i class="fas fa-newspaper"></i><span>Nyheter</span></a>
    <a href="/treninger/" class="nav-item"><i class="fas fa-calendar"></i><span>Treninger</span></a>
    <a href="/syllabus/" class="nav-item"><i class="fas fa-book-open"></i><span>Syllabus</span></a>
    <a href="https://www.algardkarate.net/algardkarate/shop/" class="nav-item" target="_blank"><i class="fas fa-shopping-bag"></i><span>Shop</span></a>
  </nav>
</body>
</html>
