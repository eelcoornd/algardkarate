<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="top-header">
    <a href="/" style="color:white;text-decoration:none"><i class="fas fa-arrow-left"></i></a>
    <span class="site-title">Algard Karate</span>
    <div style="width:20px"></div>
  </header>
  <div style="padding:16px;">
    <p style="color:#666;font-size:13px;margin-bottom:16px;">Velg en kategori</p>
    <div class="belt-list">
      {{ range sort .Pages "Params.weight" "asc" }}
      <a href="{{ .Permalink }}" class="belt-card">
        <div class="cat-icon" style="background:{{ .Params.icon_bg | default `#f0f0f0` }}"><i class="fas {{ .Params.icon | default `fa-file` }}" style="color:{{ .Params.icon_color | default `#555` }}"></i></div>
        <div class="belt-info"><span class="belt-title">{{ .Title }}</span></div>
        <i class="fas fa-chevron-right" style="color:#ccc"></i>
      </a>
      {{ end }}
    </div>
  </div>
  {{ partial "bottom-nav.html" . }}
</body>
</html>
