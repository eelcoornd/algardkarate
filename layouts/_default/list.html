{{ define "main" }}
<div style="padding:16px;">
  <div class="belt-list">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="belt-card">
      <div class="cat-icon" style="background:{{ .Params.icon_bg | default `#f0f0f0` }}"><i class="fas {{ .Params.icon | default `fa-file` }}" style="color:{{ .Params.icon_color | default `#555` }}"></i></div>
      <div class="belt-info"><span class="belt-title">{{ .Title }}</span></div>
      <i class="fas fa-chevron-right" style="color:#ccc"></i>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
