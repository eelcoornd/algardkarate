<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="top-header">
    <a href="javascript:history.back()" style="color:white;text-decoration:none"><i class="fas fa-arrow-left"></i></a>
    <span class="site-title">{{ .Title }}</span>
    <div style="width:20px"></div>
  </header>
  <div style="background:{{ .Params.icon_color | default (.Params.belt_color | default `#2e7d32`) }};padding:24px 16px;color:white;">
    <h2 style="font-size:20px;font-weight:700;">{{ .Title }}</h2>
  </div>
  <div style="padding:20px 16px;"><div class="syllabus-content">{{ .Content }}</div></div>
  {{ partial "bottom-nav.html" . }}
</body>
</html>
